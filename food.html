<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep: #151f15;

    --white: #f0ece4; --white-dim: rgba(240,236,228,0.55);
  }

  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.5; }
  .glow { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; height: 400px; background: radial-gradient(ellipse, rgba(201,169,110,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 600px; margin: 0 auto; padding: 56px 24px 80px; }
  .back { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(201,169,110,0.4); text-decoration: none; margin-bottom: 48px; transition: color 0.2s; }
  .back svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .page-footer { text-align: center; margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--gold-line); }
  .page-footer a { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(201,169,110,0.25); text-decoration: none; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">

  <a class="back" href="index.html">

    <a href="plume-food.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:12px;padding:18px 32px;border:1px solid rgba(201,169,110,0.4);background:rgba(201,169,110,0.08);text-decoration:none;-webkit-tap-highlight-color:transparent;">
      <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;letter-spacing:0.08em;color:var(--white);">View Full Menu</span>
