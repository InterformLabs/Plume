<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background-color:#0F3D2E;
  color:#C9A44C;
  font-family:Arial;
  text-align:center;
  padding-top:80px;
}

button {
  width:220px;
  padding:20px;
  margin:15px;
  font-size:35px;
  border-radius:10px;
  border:none;
  background:#0F3D2E;
  color:#C9A44C;
}
</style>

</head>

<body>

<div class="logo-container">
  <img src="logo plume.png" alt="Plume Bar Logo" class="logo" />
</div>

<a href="food.pdf">
<button>Food Menu</button>
</a>

<a href="drinks.pdf">
<button>Drink Menu</button>
</a>
.footer {
  position: fixed;
  bottom: 15px;
  width: 100%;
  text-align: center;
  font-size: 0.65rem;
  opacity: 0.5;
  z-index: 2;
}

.footer a {
  color: #C9A44C;
  text-decoration: none;
  letter-spacing: 1px;
  transition: opacity 0.3s ease;
}

.footer a:hover {
  opacity: 0.9;
}
</div>
</body>
</html>
